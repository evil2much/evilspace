# 最终定稿 · 终身不再修改
# Auto Sync MoonTVPlus 每6小时自动同步
name: Auto Sync MoonTVPlus 每6小时自动同步

# 触发规则：定时6小时 + 支持手动运行
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 自动同步任务
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送更新到仓库

    steps:
      # 1. 拉取当前仓库代码
      - name: 拉取代码
        uses: actions/checkout@v4.1.7

      # 2. 同步上游官方最新代码
      - name: 同步上游 MoonTVPlus
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: mtvpls/MoonTVPlus
          upstream_sync_branch: main
          target_sync_branch: main
          test_mode: false
