name: Auto Sync MoonTVPlus 每6小时自动同步

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时检查一次
  workflow_dispatch:       # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 自动同步上游最新代码
      - name: Sync Upstream Repository
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: mtvpls/MoonTVPlus
          upstream_sync_branch: main
          target_sync_branch: main
          test_mode: false

      # 同步成功 → 自动触发 Vercel 重新部署
      - name: Auto Trigger Vercel Deploy
        if: success()
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_qvkM9wqMZ3yjqodv2hZnoiqsqAJd/Ax6VpFiTwJ"
