name: Auto Sync MoonTVPlus
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时巡检一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: mtvpls/MoonTVPlus
          upstream_sync_branch: main
          target_sync_branch: main
          test_mode: false
          allow_ff_only: true
